name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install requirements
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Syntax check (compileall)
        run: |
          # Limit compilation to Python source directories to avoid noise from data/artifacts
          python -m compileall -q src backend tools frontend || (echo 'compileall failed' && exit 1)
      - name: Optional linters (if available)
        run: |
          if command -v flake8 >/dev/null 2>&1; then
            # Run linters but don't fail the job (helpful for forks without dev deps)
            flake8 src backend tools frontend || true
          else
            echo 'flake8 not installed; skipping lint'
          fi
      - name: List changed files
        run: git status --porcelain
